<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cold-start convergence curve">
  <defs>
    <style>
      .ax{stroke:#9aa0ad;stroke-width:1}
      .grid{stroke:#e7e2d9;stroke-width:1}
      .lbl{font-family:-apple-system,sans-serif;font-size:11px;fill:#5a6071}
      .axt{font-family:-apple-system,sans-serif;font-size:11px;fill:#5a6071}
      .ttl{font-family:-apple-system,sans-serif;font-size:11.5px;font-weight:700}
    </style>
  </defs>

  <!-- y gridlines + labels (recall %) -->
  <line class="grid" x1="60" y1="227.7" x2="500" y2="227.7"/>
  <line class="grid" x1="60" y1="173.0" x2="500" y2="173.0"/>
  <line class="grid" x1="60" y1="118.4" x2="500" y2="118.4"/>
  <line class="grid" x1="60" y1="63.7"  x2="500" y2="63.7"/>
  <text class="axt" x="54" y="231" text-anchor="end">40</text>
  <text class="axt" x="54" y="176" text-anchor="end">50</text>
  <text class="axt" x="54" y="122" text-anchor="end">60</text>
  <text class="axt" x="54" y="67"  text-anchor="end">70</text>

  <!-- axes -->
  <line class="ax" x1="60" y1="20" x2="60" y2="255"/>
  <line class="ax" x1="60" y1="255" x2="500" y2="255"/>

  <!-- x labels: training-history fraction -->
  <text class="axt" x="60"  y="270" text-anchor="middle">10</text>
  <text class="axt" x="148" y="270" text-anchor="middle">20</text>
  <text class="axt" x="236" y="270" text-anchor="middle">35</text>
  <text class="axt" x="324" y="270" text-anchor="middle">50</text>
  <text class="axt" x="412" y="270" text-anchor="middle">65</text>
  <text class="axt" x="500" y="270" text-anchor="middle">80</text>
  <text class="lbl" x="280" y="288" text-anchor="middle">training history (% of accumulated precedents)</text>
  <text class="lbl" x="16" y="140" text-anchor="middle" transform="rotate(-90 16 140)">held-out recall@3 (%)</text>

  <!-- baseline (no decay/shrink) -->
  <polyline fill="none" stroke="#5a6071" stroke-width="2"
    points="60,242.4 148,138.1 236,84.0 324,51.2 412,47.9 500,45.7"/>
  <g fill="#5a6071">
    <circle cx="60" cy="242.4" r="3"/><circle cx="148" cy="138.1" r="3"/><circle cx="236" cy="84.0" r="3"/>
    <circle cx="324" cy="51.2" r="3"/><circle cx="412" cy="47.9" r="3"/><circle cx="500" cy="45.7" r="3"/>
  </g>

  <!-- decay + shrinkage (shipped) -->
  <polyline fill="none" stroke="#2A4A7F" stroke-width="2.5"
    points="60,176.3 148,100.3 236,60.4 324,52.8 412,47.9 500,41.3"/>
  <g fill="#2A4A7F">
    <circle cx="60" cy="176.3" r="3.2"/><circle cx="148" cy="100.3" r="3.2"/><circle cx="236" cy="60.4" r="3.2"/>
    <circle cx="324" cy="52.8" r="3.2"/><circle cx="412" cy="47.9" r="3.2"/><circle cx="500" cy="41.3" r="3.2"/>
  </g>

  <!-- explore (Thompson, flag-off) -->
  <polyline fill="none" stroke="#6A4F8A" stroke-width="1.8" stroke-dasharray="5 3"
    points="60,176.3 148,100.3 236,62.1 324,51.2 412,46.8 500,39.7"/>

  <!-- cold-start gap annotation -->
  <line x1="60" y1="242.4" x2="60" y2="176.3" stroke="#C4632C" stroke-width="1.5"/>
  <text class="lbl" x="66" y="208" fill="#C4632C" font-weight="700">+12&#8201;pp</text>

  <!-- legend -->
  <g>
    <line x1="306" y1="222" x2="332" y2="222" stroke="#2A4A7F" stroke-width="2.5"/>
    <text class="lbl" x="337" y="226">decay&#8201;+&#8201;shrinkage (shipped)</text>
    <line x1="306" y1="238" x2="332" y2="238" stroke="#5a6071" stroke-width="2"/>
    <text class="lbl" x="337" y="242">baseline (equal weights)</text>
    <line x1="306" y1="254" x2="332" y2="254" stroke="#6A4F8A" stroke-width="1.8" stroke-dasharray="5 3"/>
    <text class="lbl" x="337" y="258">+ Thompson explore</text>
  </g>
</svg>
