<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mini SOP graph for car-insurance renewal">
  <defs>
    <marker id="arr-sop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a4a7f"/></marker>
    <marker id="arr-sop-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a4b4cf"/></marker>
  </defs>
  <text x="360" y="20" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" font-weight="700" letter-spacing="0.08em" fill="#5a6071">CAR-INSURANCE RENEWAL — VOCABULARY OVERVIEW</text>

  <!-- actions row -->
  <g font-family="-apple-system,sans-serif" font-size="12" font-weight="600">
    <rect x="20"  y="40" width="120" height="40" rx="20" fill="#fff" stroke="#2a4a7f" stroke-width="2"/>
    <text x="80"  y="64" text-anchor="middle" fill="#2a4a7f">Greeting</text>

    <rect x="160" y="40" width="120" height="40" rx="20" fill="#fff" stroke="#2a4a7f" stroke-width="2"/>
    <text x="220" y="64" text-anchor="middle" fill="#2a4a7f">VerifyPolicy</text>

    <rect x="300" y="40" width="120" height="40" rx="20" fill="#fff" stroke="#2a4a7f" stroke-width="2"/>
    <text x="360" y="64" text-anchor="middle" fill="#2a4a7f">DiscussPricing</text>

    <rect x="440" y="40" width="120" height="40" rx="20" fill="#fff" stroke="#2a4a7f" stroke-width="2"/>
    <text x="500" y="64" text-anchor="middle" fill="#2a4a7f">OfferDiscounts</text>

    <rect x="580" y="40" width="120" height="40" rx="20" fill="#fff" stroke="#2a4a7f" stroke-width="2"/>
    <text x="640" y="64" text-anchor="middle" fill="#2a4a7f">CloseRenewal</text>
  </g>
  <!-- forward arrows -->
  <g stroke="#2a4a7f" stroke-width="2" fill="none">
    <path d="M 140 60 L 158 60" marker-end="url(#arr-sop)"/>
    <path d="M 280 60 L 298 60" marker-end="url(#arr-sop)"/>
    <path d="M 420 60 L 438 60" marker-end="url(#arr-sop)"/>
    <path d="M 560 60 L 578 60" marker-end="url(#arr-sop)"/>
  </g>
  <!-- back arrow: DiscussPricing → OfferDiscounts → DiscussPricing (loopback) -->
  <path d="M 500 80 Q 430 130 360 80" stroke="#a4b4cf" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-sop-soft)"/>
  <text x="430" y="120" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10.5" font-style="italic" fill="#5a6071">price still too high → re-discuss</text>

  <!-- user_states band -->
  <text x="20" y="170" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em" fill="#5a6071">USER STATES</text>
  <g font-family="-apple-system,sans-serif" font-size="11" fill="#5a6071">
    <rect x="20"  y="180" width="115" height="24" rx="3" fill="#e2eaf6" stroke="#a4b4cf"/><text x="78"  y="197" text-anchor="middle">informational</text>
    <rect x="145" y="180" width="115" height="24" rx="3" fill="#e2eaf6" stroke="#a4b4cf"/><text x="203" y="197" text-anchor="middle">anxious_cost</text>
    <rect x="270" y="180" width="115" height="24" rx="3" fill="#e2eaf6" stroke="#a4b4cf"/><text x="328" y="197" text-anchor="middle">comparison</text>
    <rect x="395" y="180" width="115" height="24" rx="3" fill="#e2eaf6" stroke="#a4b4cf"/><text x="453" y="197" text-anchor="middle">ready_to_commit</text>
    <rect x="520" y="180" width="115" height="24" rx="3" fill="#e2eaf6" stroke="#a4b4cf"/><text x="578" y="197" text-anchor="middle">abandoning</text>
  </g>
  <!-- cohorts/moods band -->
  <text x="20" y="232" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em" fill="#5a6071">COHORTS × MOODS</text>
  <g font-family="-apple-system,sans-serif" font-size="11">
    <rect x="20"  y="244" width="155" height="24" rx="3" fill="#fbe7d6" stroke="#e0c4a8"/><text x="97"  y="261" text-anchor="middle" fill="#c4632c">PriceShopper · calm</text>
    <rect x="185" y="244" width="175" height="24" rx="3" fill="#fbe7d6" stroke="#e0c4a8"/><text x="272" y="261" text-anchor="middle" fill="#c4632c">PriceShopper · frustrated</text>
    <rect x="370" y="244" width="155" height="24" rx="3" fill="#fbe7d6" stroke="#e0c4a8"/><text x="447" y="261" text-anchor="middle" fill="#c4632c">LoyalCustomer · calm</text>
    <rect x="535" y="244" width="165" height="24" rx="3" fill="#fbe7d6" stroke="#e0c4a8"/><text x="617" y="261" text-anchor="middle" fill="#c4632c">FirstTime · curious</text>
  </g>
</svg>