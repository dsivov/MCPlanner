<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ar-coral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C4632C"/></marker>
    <marker id="ar-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2C8485"/></marker>
    <marker id="ar-navy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2A4A7F"/></marker>
    <marker id="ar-mcts" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6A4F8A"/></marker>
  </defs>

  <!-- async lane background -->
  <rect x="0" y="44" width="760" height="246" rx="6" fill="#fdf4ec"/>
  <text x="14" y="62" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#C4632C">ASYNC LANE — runs during the user's speech-time, 0 ms on the critical path</text>

  <text x="380" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#6A4F8A">BACKGROUND MCTS PONDERING — between turns</text>

  <!-- turn N ends -->
  <rect x="16" y="150" width="96" height="40" rx="6" fill="#2A4A7F"/>
  <text x="64" y="167" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">turn N</text>
  <text x="64" y="181" text-anchor="middle" font-size="10" fill="#dfe7f3">ends</text>

  <!-- predict next states -->
  <path d="M 112 170 L 138 170" stroke="#C4632C" stroke-width="2" fill="none" marker-end="url(#ar-coral)"/>
  <rect x="140" y="138" width="170" height="64" rx="6" fill="#fff" stroke="#C4632C" stroke-width="1.5"/>
  <text x="225" y="158" text-anchor="middle" font-size="12" font-weight="700" fill="#C4632C">Predict top-K next</text>
  <text x="225" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#C4632C">user states</text>
  <text x="225" y="190" text-anchor="middle" font-size="9.5" fill="#5a6071">empirical transition freq.</text>
  <text x="225" y="200" text-anchor="middle" font-size="9.5" fill="#5a6071">over precedent traces</text>

  <!-- spawn K searches -->
  <path d="M 310 170 L 336 170" stroke="#6A4F8A" stroke-width="2" fill="none" marker-end="url(#ar-mcts)"/>
  <rect x="338" y="120" width="190" height="100" rx="6" fill="#fff" stroke="#6A4F8A" stroke-width="1.5"/>
  <text x="433" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#6A4F8A">K MCTS searches</text>
  <text x="433" y="151" text-anchor="middle" font-size="9.5" fill="#5a6071">one per hypothesized state</text>
  <!-- mini rollout chips -->
  <g font-size="8.5" fill="#6A4F8A">
    <rect x="350" y="160" width="166" height="22" rx="3" fill="#e8e0f0"/>
    <text x="433" y="174" text-anchor="middle" font-weight="600">state s1 · actions × mood-diverse rollouts</text>
    <rect x="350" y="186" width="166" height="13" rx="3" fill="#efeaf6"/>
    <text x="433" y="196" text-anchor="middle">state s2 · …</text>
    <rect x="356" y="201" width="154" height="9" rx="3" fill="#f4f1f9"/>
  </g>

  <!-- output 1: cache decision -> consume at N+1 -->
  <path d="M 528 150 Q 580 150 580 120 L 580 104" stroke="#6A4F8A" stroke-width="2" fill="none" marker-end="url(#ar-mcts)"/>
  <rect x="500" y="70" width="244" height="34" rx="6" fill="#fff" stroke="#6A4F8A" stroke-width="1.5"/>
  <text x="622" y="84" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6A4F8A">cache decision by (cohort, state)</text>
  <text x="622" y="97" text-anchor="middle" font-size="9" fill="#5a6071">reused at N+1 if the live state matches</text>

  <!-- output 2: rollout utterances -> pool -->
  <path d="M 528 200 Q 600 210 600 236" stroke="#2C8485" stroke-width="2" fill="none" marker-end="url(#ar-teal)"/>
  <rect x="486" y="236" width="258" height="40" rx="6" fill="#d6ecec" stroke="#2C8485" stroke-width="1.5"/>
  <text x="615" y="253" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2C8485">rollout-predicted user utterances</text>
  <text x="615" y="267" text-anchor="middle" font-size="9.5" fill="#2C8485">seed data prefetch → blackboard POOL</text>

  <!-- critical path: turn N+1 consume -->
  <rect x="0" y="300" width="760" height="74" rx="6" fill="#f6f0e8"/>
  <text x="14" y="318" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#2A4A7F">CRITICAL PATH</text>

  <rect x="16" y="326" width="120" height="40" rx="6" fill="#2A4A7F"/>
  <text x="76" y="343" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">turn N+1 arrives</text>
  <text x="76" y="357" text-anchor="middle" font-size="9" fill="#dfe7f3">user speaks</text>

  <path d="M 136 346 L 168 346" stroke="#2A4A7F" stroke-width="2" fill="none" marker-end="url(#ar-navy)"/>
  <rect x="170" y="326" width="220" height="40" rx="6" fill="#fff" stroke="#2A4A7F" stroke-width="1.5"/>
  <text x="280" y="343" text-anchor="middle" font-size="11" font-weight="700" fill="#2A4A7F">classified state == hypothesis?</text>
  <text x="280" y="357" text-anchor="middle" font-size="9" fill="#5a6071">match → reuse cached search (skip live)</text>

  <path d="M 390 340 L 480 330" stroke="#6A4F8A" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#ar-mcts)"/>
  <text x="430" y="328" text-anchor="middle" font-size="8.5" fill="#6A4F8A" font-style="italic">cache hit</text>
  <rect x="482" y="320" width="120" height="20" rx="4" fill="#e8e0f0"/>
  <text x="542" y="333" text-anchor="middle" font-size="9.5" font-weight="600" fill="#6A4F8A">reuse decision</text>

  <path d="M 390 352 L 480 360" stroke="#5a6071" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#ar-navy)"/>
  <text x="432" y="372" text-anchor="middle" font-size="8.5" fill="#5a6071" font-style="italic">miss → live path</text>
  <rect x="482" y="350" width="120" height="20" rx="4" fill="#eef0f3"/>
  <text x="542" y="363" text-anchor="middle" font-size="9.5" fill="#5a6071">empirical + cosine</text>
</svg>
